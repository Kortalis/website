<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kortalis</title>
  <meta name="description" content="Professional stock market analytics, market intelligence and investor education for self-directed investors." />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #050607;
      color: #f4efe6;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }

    .container {
      max-width: 760px;
    }

    .eyebrow {
      color: #d5b898;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 13px;
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(42px, 8vw, 86px);
      margin: 0 0 18px;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    p {
      font-size: clamp(18px, 2.5vw, 24px);
      line-height: 1.5;
      color: #c8c2b8;
      margin: 0 auto 34px;
    }

    .pill {
      display: inline-block;
      border: 1px solid rgba(213, 184, 152, 0.45);
      color: #d5b898;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="eyebrow">Coming Soon</div>
    <h1>KORTALIS</h1>
    <p>
      Professional stock market analytics, market intelligence and investment research for self-directed investors.
    </p>
    <div class="pill">Launching Soon</div>
  </main>
</body>
</html>
